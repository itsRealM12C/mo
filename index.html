<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Macrosoft Office</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: rgba(255, 255, 255, 0); }
:root {
  --w10-blue: #0078D4;
  --w10-blue-dark: #005A9E;
  --w10-bg: #F3F3F3;
  --w10-border: #E1E1E1;
  --text-primary: #201F1E;
  --text-secondary: #605E5C;
  --ease-office: cubic-bezier(0.1, 0.9, 0.2, 1);
  --transition-fast: 0.1s var(--ease-office);
  --transition-base: 0.15s var(--ease-office);
}
html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; font-size: 14px; background: var(--w10-bg); color: var(--text-primary); user-select: none; }

.title-bar { height: 32px; background: #fff; border-bottom: 1px solid var(--w10-border); display: flex; align-items: center; padding: 0 8px; }
.title-text { flex: 1; text-align: center; font-size: 12px; color: var(--text-primary); }
.user-avatar { width: 24px; height: 24px; background: linear-gradient(135deg, #B0B0B0, #808080); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; margin-right: 8px; }
.win-btn { width: 46px; height: 32px; background: transparent; border: none; cursor: pointer; font-size: 12px; transition: background var(--transition-fast); }
.win-btn:hover { background: #EDEBE9; }
.win-btn.close:hover { background: #E81123; color: #fff; }

.layout { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 240px; background: #FAFAFA; border-right: 1px solid var(--w10-border); padding: 16px 8px; display: flex; flex-direction: column; gap: 4px; transition: width var(--transition-base); }
.sidebar-header { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0 8px 16px; display: flex; align-items: center; gap: 8px; }
.nav-item { padding: 10px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; transition: all var(--transition-fast); }
.nav-item:hover { background: #F0F0F0; }
.nav-item.active { background: #EAF4FB; border-left-color: var(--w10-blue); color: var(--w10-blue-dark); font-weight: 600; }
.nav-item i { width: 16px; text-align: center; color: var(--text-secondary); }
.nav-item.active i { color: var(--w10-blue); }

.main-area { flex: 1; background: #fff; overflow-y: auto; padding: 40px 48px; }
.main-header h1 { font-size: 36px; font-weight: 300; color: var(--text-primary); margin-bottom: 8px; }
.main-header p { color: var(--text-secondary); margin-bottom: 32px; }

.app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.app-card { background: #fff; border: 1px solid var(--w10-border); border-radius: 4px; padding: 24px 12px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; transition: all var(--transition-base); }
.app-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: var(--w10-blue); transform: translateY(-2px); }
.app-card:active { transform: translateY(0); }
.app-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.app-name { font-size: 14px; font-weight: 500; text-align: center; }

.mobile-menu-btn { display: none; background: transparent; border: none; font-size: 16px; cursor: pointer; padding: 0 8px; }

@media (max-width: 768px) {
  .main-area { padding: 16px; }
  .main-header h1 { font-size: 28px; }
  .sidebar { position: absolute; top: 32px; left: 0; bottom: 0; z-index: 20; box-shadow: 2px 0 8px rgba(0,0,0,0.2); transform: translateX(-100%); width: 240px; }
  .sidebar.mobile-open { transform: translateX(0); }
  .mobile-menu-btn { display: flex; align-items: center; }
  .app-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>
</head>
<body>

<div style="height: 100vh; display: flex; flex-direction: column;">
  <div class="title-bar">
    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    <div class="title-text">Microsoft Office</div>
    <div class="user-avatar"><i class="fas fa-user"></i></div>
    <button class="win-btn"><i class="far fa-window-minimize"></i></button>
    <button class="win-btn"><i class="far fa-window-restore"></i></button>
    <button class="win-btn close"><i class="fas fa-times"></i></button>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><i class="fas fa-windows" style="color: var(--w10-blue);"></i> Office</div>
      <div class="nav-item active"><i class="fas fa-home"></i> Home</div>
      <div class="nav-item"><i class="fas fa-file-circle-plus"></i> New</div>
      <div class="nav-item"><i class="fas fa-folder-open"></i> Open</div>
      <div class="nav-item"><i class="fas fa-account"></i> Account</div>
      <div class="nav-item"><i class="fas fa-gear"></i> Options</div>
    </aside>

    <main class="main-area">
      <div class="main-header">
        <h1>Office</h1>
        <p>Choose an application to start a new document.</p>
      </div>

      <div class="app-grid">
        <div class="app-card" data-app="word">
          <div class="app-icon" style="color: #2B579A;"><i class="fas fa-file-word"></i></div>
          <div class="app-name" onclick="/word.html">Word</div>
        </div>
        <div class="app-card" data-app="excel">
          <div class="app-icon" style="color: #217346;"><i class="fas fa-file-excel"></i></div>
          <div class="app-name" onclick="/excel.html">Excel</div>
        </div>
        <div class="app-card" data-app="powerpoint">
          <div class="app-icon" style="color: #C55A11;"><i class="fas fa-file-powerpoint"></i></div>
          <div class="app-name" onclick="/powerpoint.html">PowerPoint</div>
        </div>
        <div class="app-card" data-app="outlook">
          <div class="app-icon" style="color: #0F6CBD;"><i class="fas fa-envelope"></i></div>
          <div class="app-name" onclick="/outlook.html">Outlook</div>
        </div>
        <div class="app-card" data-app="onenote">
          <div class="app-icon" style="color: #80397B;"><i class="fas fa-note-sticky"></i></div>
          <div class="app-name" onclick="/onenote.html">OneNote</div>
        </div>
        <div class="app-card" data-app="access">
          <div class="app-icon" style="color: #A4373A;"><i class="fas fa-database"></i></div>
          <div class="app-name" onclick="/access.html">Access</div>
        </div>
        <div class="app-card" data-app="publisher">
          <div class="app-icon" style="color: #077467;"><i class="fas fa-newspaper"></i></div>
          <div class="app-name" onclick="/publisher.html">Publisher</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('mobile-open');
});
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('mobile-open');
  });
});
document.querySelectorAll('.app-card').forEach(card => {
  card.addEventListener('click', () => {
    // In a real app, this would open the respective application
    card.style.background = '#EAF4FB';
    setTimeout(() => card.style.background = '#fff', 200);
  });
});
</script>
</body>
</html>
